      filter: brightness(0.38) saturate(1.4);
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(0,229,255,0.12) 0%, transparent 70%),
        linear-gradient(180deg, rgba(2,11,24,0.55) 0%, rgba(2,11,24,0.3) 50%, rgba(2,11,24,0.8) 100%);
    }

    /* ── Scanline overlay ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,229,255,0.025) 2px,
        rgba(0,229,255,0.025) 4px
      );
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 44px 40px 36px;
      backdrop-filter: blur(18px) saturate(1.6);
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.08),
        0 32px 64px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(0,229,255,0.15);
      animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    /* corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* ── Logo / brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      flex-shrink: 0;
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 6px var(--cyan)); }
      50%      { filter: drop-shadow(0 0 18px var(--cyan)) drop-shadow(0 0 6px var(--purple)); }
    }
    .brand-name {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: .12em;
      color: #fff;
      text-transform: uppercase;
    }
    .brand-name span { color: var(--cyan); }

    /* ── Heading ── */
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: .8rem;
      letter-spacing: .22em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: .7;
    }
    .subtitle {
      font-size: 1.05rem;
      color: rgba(255,255,255,.5);
      font-weight: 300;
      margin-bottom: 32px;
      letter-spacing: .04em;
    }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(0,229,255,.6);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.18);
      border-radius: 3px;
      padding: 11px 14px;
      color: #e0f7ff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: .04em;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input::placeholder { color: rgba(255,255,255,.2); }
    input:focus {
      border-color: var(--cyan);
      background: rgba(0,229,255,0.07);
      box-shadow: 0 0 0 2px rgba(0,229,255,0.12), var(--glow);
    }

    /* ── Verify checkbox (Cloudflare CAPTCHA style) ── */
    .verify {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.14);
      border-radius: 3px;
      padding: 14px 16px;
      margin: 24px 0 22px;
      cursor: pointer;
      user-select: none;
      transition: border-color .2s;
    }
    .verify:hover { border-color: rgba(0,229,255,0.35); }
    .verify-box {
      width: 22px; height: 22px;
      border: 2px solid rgba(0,229,255,0.4);
      border-radius: 3px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .25s;
    }
    .verify.checked .verify-box {
      background: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0,229,255,0.5);
    }
    .verify.checked .verify-box::after {
      content: '';
      display: block;
      width: 6px; height: 11px;
      border: 2px solid var(--dark);
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-2px);
    }
    .verify-text { flex: 1; font-size: .92rem; color: rgba(255,255,255,.75); letter-spacing: .04em; }
    .verify-brand {
      font-family: 'Orbitron', monospace;
      font-size: .55rem;
      color: rgba(0,229,255,.4);
      letter-spacing: .1em;
      text-align: right;
      line-height: 1.4;
    }

    /* ── Submit button ── */
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(155,93,229,0.15));
      border: 1px solid var(--cyan);
      border-radius: 3px;
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all .25s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      opacity: 0;
      transition: opacity .25s;
    }
    .btn:hover { box-shadow: var(--glow); color: var(--dark); }
    .btn:hover::before { opacity: 1; }
    .btn span { position: relative; z-index: 1; }

    /* ── Footer links ── */
    .footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: .78rem;
      color: rgba(255,255,255,.3);
      letter-spacing: .05em;
    }
    .footer-links a {
      color: rgba(0,229,255,.5);
      text-decoration: none;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--cyan); }

    /* ── Ticker bar at bottom ── */
    .ticker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(2,11,24,0.85);
      border-top: 1px solid rgba(0,229,255,0.15);
      padding: 6px 0;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      color: rgba(0,229,255,.6);
    }
    .ticker-inner {
      display: inline-block;
      white-space: nowrap;
      animation: ticker 28s linear infinite;
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .up   { color: #00ff9d; }
    .down { color: var(--pink); }
    .ticker-item { margin: 0 32px; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="scanlines"></div>

<div class="card">
  <div class="brand">
    <div class="brand-icon"></div>
    <div class="brand-name">NEO<span>MATRIX</span></div>
  </div>

  <h1>Portail Sécurisé</h1>
  <p class="subtitle">Connectez-vous à votre tableau de bord</p>

  <div class="field">
    <label>Adresse e-mail</label>
    <input type="email" placeholder="operator@neomatrix.io" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <input type="password" placeholder="••••••••••••"/>
  </div>

  <!-- Cloudflare-style human verify -->
  <div class="verify" id="verify" onclick="toggleVerify()">
    <div class="verify-box" id="vbox"></div>
    <span class="verify-text">Je ne suis pas un robot</span>
    <div class="verify-brand">NEO<br>SHIELD</div>
  </div>

  <button class="btn" onclick="handleLogin()"><span>Accéder au système</span></button>

  <div class="footer-links">
    <a href="#">Mot de passe oublié ?</a>
    <a href="#">Créer un compte</a>
  </div>
</div>

<!-- Live ticker -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<script>
  // Verify checkbox
  function toggleVerify() {
    const el = document.getElementById('verify');
    el.classList.toggle('checked');
  }

  // Login button
  function handleLogin() {
    const verified = document.getElementById('verify').classList.contains('checked');
    if (!verified) {
      document.getElementById('verify').style.borderColor = '#ff2d78';
      setTimeout(() => document.getElementById('verify').style.borderColor = '', 1000);
      return;
    }
    const btn = document.querySelector('.btn span');
    btn.textContent = 'Authentification…';
    setTimeout(() => btn.textContent = '✓ Accès autorisé', 1800);
  }

  // Ticker
  const tickers = [
    {sym:'$BTC', val:'+2.4%', up:true},{sym:'$ETH', val:'+7.8%', up:true},
    {sym:'$SOL', val:'-0.3%', up:false},{sym:'SPY', val:'+1.5%', up:true},
    {sym:'$ARB', val:'+9.0%', up:true},{sym:'$BNB', val:'-1.8%', up:false},
    {sym:'$MATIC', val:'+3.2%', up:true},{sym:'QQQ', val:'+2.1%', up:true},
    {sym:'$LINK', val:'-0.9%', up:false},{sym:'$AVAX', val:'+4.5%', up:true},
  ];
  const html = [...tickers, ...tickers].map(t =>
    `<span class="ticker-item">${t.sym} <span class="${t.up?'up':'down'}">${t.val}</span></span>`
  ).join('');
  document.getElementById('ticker').innerHTML = html;
</script>
</body>
</html>
